apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: agentflow
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/agentflow-api-gateway-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator-sa
  namespace: agentflow
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/agentflow-orchestrator-role
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentflow-config
  namespace: agentflow
data:
  LOG_LEVEL: "INFO"
  AWS_REGION: "us-east-1"
