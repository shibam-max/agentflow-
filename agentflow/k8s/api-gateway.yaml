apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agentflow
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: api-gateway-sa
      containers:
        - name: api-gateway
          image: ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/agentflow/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: agentflow-secrets
                  key: postgres-url
            - name: POSTGRES_USER
              value: agentflow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentflow-secrets
                  key: db-password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentflow-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentflow-secrets
                  key: jwt-secret
            - name: ORCHESTRATOR_URL
              value: http://orchestrator-svc:8000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: agentflow
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: agentflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
