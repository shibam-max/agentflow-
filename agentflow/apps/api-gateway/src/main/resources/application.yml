spring:
  application:
    name: agentflow-api-gateway

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/agentflow}
    username: ${POSTGRES_USER:agentflow}
    password: ${POSTGRES_PASSWORD:localpass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-at-least-32-chars-long}

orchestrator:
  url: ${ORCHESTRATOR_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: '{"time":"%d{ISO8601}","level":"%p","logger":"%logger{36}","msg":"%m"}%n'
